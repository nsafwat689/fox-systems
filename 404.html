<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Get the current path
    var path = window.location.pathname;
    
    // Remove the /fox-systems/ prefix
    var cleanPath = path.replace(/^\/fox-systems/, '');
    
    // If it's not the root path, redirect to index.html with hash
    if (cleanPath !== '/' && cleanPath !== '/index.html') {
      window.location.href = '/fox-systems/';
    }
  </script>
</head>
<body>
  <p>If you are not redirected automatically, <a href="/fox-systems/">click here</a>.</p>
</body>
</html>
